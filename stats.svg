<svg viewBox="0 0 400 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Thewni's skill radar chart</title>
<desc>Spider web radar chart showing language skills</desc>
<style>
  .web-ring { fill: none; stroke: #ffd6e7; stroke-width: 0.8; }
  .web-spoke { stroke: #ffb6c1; stroke-width: 0.8; }
  .web-area { fill: #FF6B9D; fill-opacity: 0.25; stroke: #FF6B9D; stroke-width: 2; stroke-linejoin: round; }
  .web-dot { fill: #FF6B9D; }
  .label { font-size: 12px; fill: #FF6B9D; font-weight: 500; font-family: sans-serif; }
</style>
<g transform="translate(200,175)">
  <polygon class="web-ring" points="0,-120 113.8,-60 113.8,60 0,120 -113.8,60 -113.8,-60"/>
  <polygon class="web-ring" points="0,-90 85.4,-45 85.4,45 0,90 -85.4,45 -85.4,-45"/>
  <polygon class="web-ring" points="0,-60 56.9,-30 56.9,30 0,60 -56.9,30 -56.9,-30"/>
  <polygon class="web-ring" points="0,-30 28.5,-15 28.5,15 0,30 -28.5,15 -28.5,-15"/>
  <line class="web-spoke" x1="0" y1="0" x2="0" y2="-120"/>
  <line class="web-spoke" x1="0" y1="0" x2="113.8" y2="-60"/>
  <line class="web-spoke" x1="0" y1="0" x2="113.8" y2="60"/>
  <line class="web-spoke" x1="0" y1="0" x2="0" y2="120"/>
  <line class="web-spoke" x1="0" y1="0" x2="-113.8" y2="60"/>
  <line class="web-spoke" x1="0" y1="0" x2="-113.8" y2="-60"/>
  <polygon class="web-area" points="0,-108 85.3,-37.5 96.9,51 0,84 -73.9,39 -91.5,-54.6"/>
  <circle class="web-dot" cx="0" cy="-108" r="4"/>
  <circle class="web-dot" cx="85.3" cy="-37.5" r="4"/>
  <circle class="web-dot" cx="96.9" cy="51" r="4"/>
  <circle class="web-dot" cx="0" cy="84" r="4"/>
  <circle class="web-dot" cx="-73.9" cy="39" r="4"/>
  <circle class="web-dot" cx="-91.5" cy="-54.6" r="4"/>
</g>
<text x="200" y="42" text-anchor="middle" class="label">Java 90%</text>
<text x="328" y="128" text-anchor="start" class="label">Kotlin 75%</text>
<text x="328" y="248" text-anchor="start" class="label">Python 85%</text>
<text x="200" y="318" text-anchor="middle" class="label">MySQL 70%</text>
<text x="60" y="248" text-anchor="end" class="label">JS 65%</text>
<text x="60" y="128" text-anchor="end" class="label">Android 80%</text>
</svg>
